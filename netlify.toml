[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_VERCEL_API_URL,VITE_GEMINI_API_KEY,VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ID,VITE_EMAILJS_PUBLIC_KEY"

# SPA fallback — all routes go to index.html (HashRouter handles the rest)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
